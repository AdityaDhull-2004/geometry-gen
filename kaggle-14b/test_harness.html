<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GeoGebra batch validator</title>
<script src="https://www.geogebra.org/apps/deployggb.js"></script>
</head>
<body>
<div id="ggb"></div>
<script>
"use strict";

// Mirrors renderer.html exactly so the validation matches what the user sees.
let ggbApi = null;
window.__ggbReady = false;

const params = {
  appName: "classic",
  width: 800, height: 600,
  showToolBar: false, showMenuBar: false, showAlgebraInput: false,
  showResetIcon: false, enableRightClick: false,
  appletOnLoad: function (api) { ggbApi = api; window.__ggbReady = true; }
};
window.addEventListener("load", function () {
  new GGBApplet(params, true).inject("ggb");
});

// ── identical auto-parameterize logic from renderer.html ────────────────────
function parseOneArgPoint(cmd) {
  const c = cmd.trim();
  if (!c.startsWith("Point(") || !c.endsWith(")")) return null;
  const inner = c.slice(6, -1);
  let depth = 0;
  for (let i = 0; i < inner.length; i++) {
    const ch = inner[i];
    if (ch === "(") depth++;
    else if (ch === ")") depth--;
    else if (ch === "," && depth === 0) return null;
  }
  const trimmed = inner.trim();
  if (!trimmed || trimmed.startsWith("(")) return null;
  return trimmed;
}

function autoParameterize(steps) {
  const classOf = new Map();
  for (const st of steps) classOf.set(st.name, st.class);
  const isInfiniteLine = (path) =>
    path.startsWith("Line(") || classOf.get(path) === "line";

  const counts = new Map();
  const paths  = [];
  for (const st of steps) {
    if (st.class !== "point") { paths.push(null); continue; }
    let p = parseOneArgPoint(st.command);
    if (p !== null && isInfiniteLine(p)) p = null;
    paths.push(p);
    if (p !== null) counts.set(p, (counts.get(p) || 0) + 1);
  }
  const seen = new Map();
  const out = [];
  for (let i = 0; i < steps.length; i++) {
    const st = steps[i], path = paths[i];
    if (path === null) { out.push(st); continue; }
    const k = counts.get(path);
    const ix = seen.get(path) || 0;
    seen.set(path, ix + 1);
    const t = ((ix + 1) / (k + 1)).toFixed(4);
    out.push(Object.assign({}, st, { command: "Point(" + path + ", " + t + ")" }));
  }
  return out;
}

// ── run one problem, return list of failed steps ────────────────────────────
window.runProblem = function (data) {
  const steps = autoParameterize(data.construction_steps);
  ggbApi.reset();
  const failed = [];
  for (const st of steps) {
    const line = st.name + " = " + st.command;
    let threw = null;
    try { ggbApi.evalCommand(line); } catch (e) { threw = String(e); }
    if (!ggbApi.exists(st.name)) {
      failed.push({ name: st.name, command: st.command, threw: threw });
    }
  }
  return { id: data.id, total: steps.length, failed: failed };
};

// Random stratified t: i-th of k points on a path gets a uniform sample inside
// its own [i/k, (i+1)/k] slice, then strata are shuffled. Distinguishes genuine
// construction bugs from coincidences created by one particular t-assignment.
function autoParameterizeRandom(steps) {
  const classOf = new Map();
  for (const st of steps) classOf.set(st.name, st.class);
  const isInfiniteLine = (path) =>
    path.startsWith("Line(") || classOf.get(path) === "line";
  const counts = new Map(), paths = [];
  for (const st of steps) {
    if (st.class !== "point") { paths.push(null); continue; }
    let p = parseOneArgPoint(st.command);
    if (p !== null && isInfiniteLine(p)) p = null;
    paths.push(p);
    if (p !== null) counts.set(p, (counts.get(p) || 0) + 1);
  }
  const EPS = 0.04, span = 1 - 2 * EPS;
  const queues = new Map();
  for (const [path, k] of counts) {
    const ts = [];
    for (let j = 0; j < k; j++) {
      const lo = EPS + (j * span) / k, hi = EPS + ((j + 1) * span) / k;
      ts.push(lo + Math.random() * (hi - lo));
    }
    for (let j = ts.length - 1; j > 0; j--) {
      const r = Math.floor(Math.random() * (j + 1));
      [ts[j], ts[r]] = [ts[r], ts[j]];
    }
    queues.set(path, ts);
  }
  const out = [];
  for (let i = 0; i < steps.length; i++) {
    const st = steps[i], path = paths[i];
    if (path === null) { out.push(st); continue; }
    const t = queues.get(path).shift().toFixed(4);
    out.push(Object.assign({}, st, { command: "Point(" + path + ", " + t + ")",
                                     _seed: { path: path, t: t } }));
  }
  return out;
}

// Run with random t; return only whether every step produced an object.
window.runProblemRandom = function (data) {
  const steps = autoParameterizeRandom(data.construction_steps);
  ggbApi.reset();
  let nf = 0;
  for (const st of steps) {
    try { ggbApi.evalCommand(st.name + " = " + st.command); } catch (e) {}
    if (!ggbApi.exists(st.name)) nf++;
  }
  return nf;
};

// Run an arbitrary step array (candidate fix). Returns failures + coords of
// every point, so a fix can be verified before it is written to the dataset.
window.runSteps = function (steps, useRandom) {
  const built = useRandom ? autoParameterizeRandom(steps) : autoParameterize(steps);
  ggbApi.reset();
  const failed = [];
  for (const st of built) {
    try { ggbApi.evalCommand(st.name + " = " + st.command); } catch (e) {}
    if (!ggbApi.exists(st.name)) failed.push(st.name + " = " + st.command);
  }
  const coords = {};
  for (const st of steps) {
    if (st.class === "point" && ggbApi.exists(st.name)) {
      const x = ggbApi.getXcoord(st.name), y = ggbApi.getYcoord(st.name);
      coords[st.name] = [Math.round(x * 100) / 100, Math.round(y * 100) / 100];
    }
  }
  return { failed: failed, coords: coords };
};

// Full-precision coordinate probe: build the steps (random or stratified t) and
// return UNROUNDED coords of every point, so Python-side numeric checks can verify
// the theorem (collinear / concyclic / concurrent / parallel ...) holds — this is
// what catches a wrong intersection-index pick that still renders fine.
window.probeFull = function (steps, useRandom) {
  const built = useRandom ? autoParameterizeRandom(steps) : autoParameterize(steps);
  ggbApi.reset();
  const failed = [];
  for (const st of built) {
    try { ggbApi.evalCommand(st.name + " = " + st.command); } catch (e) {}
    if (!ggbApi.exists(st.name)) failed.push(st.name + " = " + st.command);
  }
  const coords = {};
  for (const st of steps) {
    if (st.class === "point" && ggbApi.exists(st.name)) {
      try {
        coords[st.name] = [ggbApi.getXcoord(st.name), ggbApi.getYcoord(st.name)];
      } catch (e) { /* object named as a point but unreadable (e.g. wrong type) - skip */ }
    }
  }
  return { failed: failed, coords: coords };
};

// Replicate the renderer's new free-point + SetValue execution, then report
// whether each auto-parameterized point is positioned AND still draggable.
window.renderLikeApp = function (data) {
  const steps = autoParameterizeRandom(data.construction_steps);
  ggbApi.reset();
  const failed = [];
  for (const st of steps) {
    try {
      if (st._seed) {
        ggbApi.evalCommand(st.name + " = Point(" + st._seed.path + ")");
        ggbApi.evalCommand("SetValue(" + st.name + ", Point(" + st._seed.path + ", " + st._seed.t + "))");
      } else {
        ggbApi.evalCommand(st.name + " = " + st.command);
      }
    } catch (e) {}
    if (!ggbApi.exists(st.name)) failed.push(st.name);
  }
  const probes = {};
  for (const st of steps) {
    if (!st._seed) continue;
    const before = [ggbApi.getXcoord(st.name), ggbApi.getYcoord(st.name)];
    ggbApi.evalCommand("__d = Point(" + st._seed.path + ", 0.9)");   // a different spot on the path
    ggbApi.setCoords(st.name, ggbApi.getXcoord("__d"), ggbApi.getYcoord("__d"));
    const after = [ggbApi.getXcoord(st.name), ggbApi.getYcoord(st.name)];
    ggbApi.deleteObject("__d");
    probes[st.name] = { def: ggbApi.getCommandString(st.name), before: before,
                        after_drag: after,
                        moved: Math.hypot(after[0]-before[0], after[1]-before[1]) > 1e-6 };
  }
  return { failed: failed, probes: probes };
};

// Per-step detail (no auto-parameterize) for deep debugging one problem.
window.debugProblem = function (data) {
  ggbApi.reset();
  const rows = [];
  for (const st of data.construction_steps) {
    let threw = null;
    try { ggbApi.evalCommand(st.name + " = " + st.command); } catch (e) { threw = String(e); }
    const ok = ggbApi.exists(st.name);
    let val = "";
    try { if (ok) val = ggbApi.getValueString(st.name); } catch (e) {}
    rows.push({ name: st.name, command: st.command, ok: ok, val: val, threw: threw });
  }
  return rows;
};
</script>
</body>
</html>
